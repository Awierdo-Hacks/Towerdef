# =============================================================================
# Level 1 — The Winding Road
# =============================================================================
# An introductory level with a long winding path and generous build spots.
# The long path gives towers more time to fire at enemies.

# --- Map dimensions (tiles, each tile = 1x1 game-world unit) ---
map.width=20
map.height=15

# --- Spawn point (where enemies appear) ---
spawn.x=0.0
spawn.y=7.0

# --- Base position (what enemies walk toward) ---
base.x=19.0
base.y=7.0

# --- Ground path waypoints (semicolon-separated x,y pairs) ---
# Enemies walk in straight lines between consecutive waypoints.
# Route: left edge → right turn → up → long horizontal → down → right → base
path.waypoints=0.0,7.0;5.0,7.0;5.0,3.0;15.0,3.0;15.0,12.0;19.0,12.0;19.0,7.0

# --- Flying path (optional — FlyingEnemies take a shorter aerial route) ---
# Straight diagonal shortcut across the map
path.flying.waypoints=0.0,7.0;10.0,5.0;19.0,7.0

# --- Build spots (where towers can be placed) ---
# Placed near path corners and along straight segments for strategic variety
build.spots=3.0,5.0;3.0,9.0;7.0,1.0;7.0,5.0;10.0,1.0;10.0,5.0;13.0,5.0;13.0,10.0;17.0,10.0;17.0,14.0

# --- Wave definitions (used by WaveManager in Fase 7) ---
wave.count=5
wave.1.enemies=basic:5
wave.2.enemies=basic:8,armored:2
wave.3.enemies=basic:10,armored:4,flying:1
wave.4.enemies=basic:12,armored:6,flying:3
wave.5.enemies=basic:15,armored:8,flying:5
