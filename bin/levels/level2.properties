# =============================================================================
# Level 2 — The Gauntlet
# =============================================================================
# A harder level with a shorter, more direct path and fewer build spots.
# Enemies reach the base faster, forcing the player to be more strategic.

# --- Map dimensions ---
map.width=20
map.height=15

# --- Spawn point ---
spawn.x=0.0
spawn.y=3.0

# --- Base position ---
base.x=19.0
base.y=12.0

# --- Ground path waypoints ---
# A shorter Z-shaped route — enemies arrive faster than level 1
path.waypoints=0.0,3.0;9.0,3.0;9.0,12.0;19.0,12.0

# --- Flying path (optional — even shorter direct route) ---
path.flying.waypoints=0.0,3.0;19.0,12.0

# --- Build spots (fewer than level 1 — harder decisions) ---
build.spots=4.0,1.0;4.0,5.0;7.0,5.0;11.0,5.0;11.0,10.0;11.0,14.0;14.0,10.0;14.0,14.0

# --- Wave definitions (harder than level 1) ---
wave.count=6
wave.1.enemies=basic:6,armored:1
wave.2.enemies=basic:10,armored:3
wave.3.enemies=basic:10,armored:5,flying:2
wave.4.enemies=basic:12,armored:6,flying:4
wave.5.enemies=basic:15,armored:8,flying:6
wave.6.enemies=basic:20,armored:10,flying:8
