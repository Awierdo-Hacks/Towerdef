# =============================================================================
# Tower Defence — Main Game Configuration
# =============================================================================
# Loaded by ConfigManager at startup. All values have sensible defaults.

# --- Window ---
window.width=800
window.height=600
window.title=Tower Defence

# --- Game world (in game-world units, NOT pixels) ---
game.width=20.0
game.height=15.0

# --- Starting resources ---
starting.gold=200
starting.lives=20

# --- Level selection (1 or 2) ---
selected.level=1

# --- Lua AI script (pad relatief aan classpath-root) ---
# Dit script wordt elke frame aangeroepen voor elke vijand.
# Zet op een lege string of verwijder de key om Lua uit te schakelen.
lua.script=scripts/enemy_ai.lua
